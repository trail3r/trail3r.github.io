<section class="hero">
    <a class="hero__link" href="{{ '/' | relative_url }}">
        <div class="hero__inner-wrap">
            <img
                class="hero__image"
                src="/assets/images/pages/home/minecraft_cold_frog.gif"
                width="300"
                height="225"
                alt=""
            >
        </div>

        <div class="hero__content">
            <p class="hero__title">{{ site.title }}</p>

            <div class="hero__description">
                <p>{{ site.description }}</p>
            </div>
        </div>
    </a>
</section>
